<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Aim Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="game-container"></div>
    
    <div id="crosshair"></div>
    
    <div id="ui-overlay">
        <div id="start-screen">
            <h1>Daily Aim Course</h1>
            <p id="start-btn">Click anywhere to start</p>
            <div class="settings">
                <label>
                    CS:GO Sensitivity:
                    <input type="number" id="sens-input" value="1.0" step="0.1">
                </label>
            </div>
            <button id="edit-keybinds-btn" class="menu-btn" style="margin-top: 20px;">Edit Keybinds</button>
        </div>
        
        <div id="keybinds-screen" style="display: none;">
            <h2>Keybinds</h2>
            <div class="keybinds-list" id="keybinds-list">
                <!-- populated by JS -->
            </div>
            <button id="save-keybinds-btn" class="menu-btn" style="margin-top: 20px;">Back</button>
        </div>

        <div id="hud" style="display: none;">
            <div id="timer">0.00s</div>
            <div id="target-count">Targets: 0/0</div>
        </div>
    </div>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
